<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhaskar Finance - Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <div class="brand-logo">
                Bhaskar Finance
            </div>
            <p style="text-align: center; color: #666; margin-bottom: 20px;">Create your account</p>
            
            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="Enter your email" required autocomplete="email">
                    <div class="error-msg" id="email-error">Please enter a valid email</div>
                </div>
                
                <div class="form-group">
                    <label for="signup-password">Create Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password" required autocomplete="new-password">
                    <div class="error-msg" id="password-error">Password must be at least 6 characters</div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required autocomplete="new-password">
                    <div class="error-msg" id="confirm-error">Passwords do not match</div>
                </div>
                
                <div class="success-msg" id="signup-success">Account created successfully! Redirecting...</div>

                <button type="submit" class="btn-primary" id="signup-btn">
                    Sign Up
                </button>

                <div class="auth-nav-link">
                    Already have an account? <a href="index.html">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Simple Signup Logic
        document.getElementById('signup-form').addEventListener('submit', function(event) {
            // Prevent the page from refreshing on form submit
            event.preventDefault();
            
            // Get values from input fields
            let email = document.getElementById('signup-email').value;
            let password = document.getElementById('signup-password').value;
            let confirmPass = document.getElementById('confirm-password').value;
            
            let isValid = true;
            
            // Validate email
            if (email === '' || !email.includes('@')) {
                document.getElementById('email-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('email-error').classList.remove('show');
            }
            
            // Validate password length
            if (password.length < 6) {
                document.getElementById('password-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('password-error').classList.remove('show');
            }

            // Validate that passwords match
            if (password !== confirmPass) {
                document.getElementById('confirm-error').classList.add('show');
                isValid = false;
            } else {
                document.getElementById('confirm-error').classList.remove('show');
            }
            
            // If everything is valid, save to localStorage and redirect
            if (isValid) {
                // Save user details to browser memory
                localStorage.setItem('bhaskar_auth_email', email);
                localStorage.setItem('bhaskar_auth_password', password);

                // Show success message
                document.getElementById('signup-success').classList.add('show');
                
                // Change button text
                document.getElementById('signup-btn').innerText = 'Creating...';
                
                // Redirect to login page after 1.5 seconds
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1500);
            }
        });
    </script>
</body>
</html>
